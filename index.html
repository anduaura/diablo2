<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0705">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sanctuary — a Diablo II–style web ARPG</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="game"></canvas>
<canvas id="minimap"></canvas>

<!-- top bar -->
<div id="topbar" class="hidden">
  <div id="floorLabel">Bone Crypts · 1</div>
  <div id="goldLabel">🪙 0</div>
  <div class="topbtns">
    <button id="btnPortal" class="iconbtn" title="Town Portal (T)">🌀</button>
    <button id="btnChar" class="iconbtn" title="Character (C)">🧍<span id="charBadge" class="badge hidden">+</span></button>
    <button id="btnInv"  class="iconbtn" title="Inventory (I)">🎒</button>
    <button id="btnMenu" class="iconbtn" title="Menu (Esc)">☰</button>
  </div>
</div>

<div id="banner" class="hidden"></div>

<!-- bottom HUD -->
<div id="hud" class="hidden">
  <div class="globecol">
    <button class="potbtn" id="btnHpPot">🧪<span class="count" id="hpPotCount">0</span></button>
    <div class="globe hp"><div class="gfill" id="hpFill"></div><div class="gshine"></div><span class="gtext" id="hpText"></span></div>
  </div>
  <div id="hudmid">
    <div id="xprow">
      <div id="xpbar"><div id="xpFill"></div></div>
      <button id="btnAuto" title="Auto-cast skills">🤖<span>AUTO</span></button>
    </div>
    <div id="skillrow">
      <button class="skillbtn" id="btnSkill1"><span class="sicon"></span><span class="cost"></span><div class="cdmask"></div></button>
      <button class="skillbtn" id="btnSkill2"><span class="sicon"></span><span class="cost"></span><div class="cdmask"></div></button>
      <button class="skillbtn" id="btnSkill3"><span class="sicon"></span><span class="cost"></span><div class="cdmask"></div></button>
      <button class="skillbtn" id="btnSkill4"><span class="sicon"></span><span class="cost"></span><div class="cdmask"></div></button>
    </div>
  </div>
  <div class="globecol">
    <button class="potbtn" id="btnMpPot">🔮<span class="count" id="mpPotCount">0</span></button>
    <div class="globe mp"><div class="gfill" id="mpFill"></div><div class="gshine"></div><span class="gtext" id="mpText"></span></div>
  </div>
</div>

<!-- main menu / class select -->
<div id="menuScreen" class="screen">
  <h1 class="gtitle">⚔ SANCTUARY ⚔</h1>
  <p class="gsub">a Diablo II–inspired action RPG for your browser</p>
  <div id="roster"></div>
  <p class="pick">— forge a new hero —</p>
  <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center">
    <button id="hcToggle" class="smallbtn" style="flex:none">☠ Hardcore: OFF</button>
    <button id="chToggle" class="smallbtn" style="flex:none">🏆 Challenge: OFF</button>
  </div>
  <div id="classCards"></div>
  <div id="trophies" class="hidden"></div>
  <div id="graveyard" class="hidden"></div>
  <p id="slotsFull" class="hint hidden">All three slots are full — release a hero to forge a new one.</p>
  <p class="hint">Tap to move & attack · hold to run · buttons cast skills</p>
</div>

<!-- victory screen -->
<div id="victoryScreen" class="screen hidden">
  <h1 class="gtitle">⚔ VICTORY ⚔</h1>
  <p id="victoryInfo" class="gsub"></p>
  <button id="btnNgPlus" class="bigbtn">🔥 Enter New Game+</button>
  <button id="btnKeepPlaying" class="smallbtn" style="flex:none; width:220px; padding:12px">Keep exploring this world</button>
</div>

<!-- death screen -->
<div id="deathScreen" class="screen hidden">
  <h1 class="gtitle red">YOU HAVE DIED</h1>
  <p id="deathInfo" class="gsub"></p>
  <button id="btnRespawn" class="bigbtn">Rise Again</button>
</div>

<!-- panels (contents built by JS) -->
<div id="charPanel" class="panel hidden"></div>
<div id="invPanel" class="panel hidden"></div>
<div id="pausePanel" class="panel hidden"></div>
<div id="wpPanel" class="panel hidden"></div>
<div id="shopPanel" class="panel hidden"></div>
<div id="stashPanel" class="panel hidden"></div>
<div id="riftPanel" class="panel hidden"></div>
<div id="npcPanel" class="panel hidden"></div>
<div id="fusePanel" class="panel hidden"></div>
<div id="stablePanel" class="panel hidden"></div>
<div id="stairsPanel" class="panel hidden"></div>
<div id="itemPopup" class="hidden"></div>

<script src="js/game.js"></script>
<script>
if ('serviceWorker' in navigator) addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
</script>
</body>
</html>
