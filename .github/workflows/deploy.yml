name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build info into version.js
        run: |
          BUILD="${GITHUB_RUN_NUMBER}-${GITHUB_SHA:0:7} ($(date -u +%Y-%m-%d))"
          sed -i "s/const SANCTUARY_BUILD = 'dev';/const SANCTUARY_BUILD = '${BUILD}';/" js/version.js
          grep SANCTUARY_BUILD js/version.js
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
